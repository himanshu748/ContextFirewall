  <text x="1130" y="205" font-size="12" fill="#34d399" text-anchor="middle" font-family="ui-monospace,monospace" letter-spacing="1.5" opacity="0.85">TRUSTED PACK</text>

  <!-- guide rails -->
  <g stroke="#141922" stroke-width="1.5" stroke-dasharray="2 8" stroke-linecap="round">
