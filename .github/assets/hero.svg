<svg width="1280" height="440" viewBox="0 0 1280 440" fill="none"
     xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <radialGradient id="glow" cx="32%" cy="22%" r="80%">
      <stop offset="0%" stop-color="#0e2233"/>
      <stop offset="55%" stop-color="#0a0d13"/>
      <stop offset="100%" stop-color="#08090c"/>
    </radialGradient>
    <linearGradient id="membrane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8f6ff"/>
      <stop offset="100%" stop-color="#8fd4f5"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#12161f" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="1278" height="438" rx="22" fill="url(#glow)" stroke="#1b2130"/>
  <rect x="1" y="1" width="1278" height="438" rx="22" fill="url(#grid)" opacity="0.5"/>

  <!-- brand mark -->
  <g transform="translate(60,52)">
    <rect width="52" height="52" rx="13" fill="#0c141d" stroke="#1e6a8e"/>
    <path d="M26 11 L40 17 V27 C40 35 34 40 26 43 C18 40 12 35 12 27 V17 Z"
          fill="none" stroke="#38bdf8" stroke-width="2.4" stroke-linejoin="round"/>
    <path d="M26 27 V43 C34 40 40 35 40 27 V17 Z" fill="#38bdf8" fill-opacity="0.12"/>
  </g>
  <text x="128" y="80" font-size="38" font-weight="700" fill="url(#wordmark)" letter-spacing="-0.5">ContextFirewall</text>
  <text x="129" y="110" font-size="17" fill="#9aa4b2">Guardrails for the memory layer — an MCP trust firewall for your AI agent's memory.</text>

  <!-- live pill -->
  <g transform="translate(1060,60)">
    <rect width="158" height="30" rx="15" fill="#0c1512" stroke="#1f5641"/>
    <circle cx="20" cy="15" r="4" fill="#34d399">
      <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="34" y="20" font-size="13" fill="#7fe3bf" font-family="ui-monospace,monospace">Cognee · live</text>
  </g>

